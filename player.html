<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جهاز التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* إزالة التحديد الأزرق المزعج للأزرار في الجوال */
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;}
        input { user-select: auto; -webkit-user-select: auto; } /* السماح بالكتابة في الحقول */

        body { background: #F5F2E9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center;}
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.3s;}
        .screen.active { display: flex; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        
        h1 { color: #DE6241; font-size: 32px; margin-bottom: 20px; }
        input { width: 90%; max-width: 350px; padding: 15px; font-size: 22px; margin: 10px 0; border: 2px solid #ccc; border-radius: 10px; text-align: center; font-weight: bold; }
        button { background: #DE6241; color: white; border: none; padding: 15px; font-size: 22px; border-radius: 10px; font-weight: bold; width: 90%; max-width: 350px; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.1s;}
        button:active { transform: scale(0.95); }
        .btn-sec { background: white; color: #DE6241; border: 2px solid #DE6241; }
        
        .buzzer-btn { background: #e74c3c; width: 250px; height: 250px; border-radius: 50%; border: 10px solid #c0392b; box-shadow: 0 15px 0 #c0392b; color: white; font-size: 50px; font-weight: 900;}
        .buzzer-btn:active { transform: translateY(15px); box-shadow: 0 0 0 #c0392b; }
        
        .clicker-btn { background: #DE6241; color: white; width: 100%; height: 300px; font-size: 60px; border-radius: 20px; border: 10px solid #c0392b; box-shadow: 0 15px 0 #c0392b;}
        .clicker-btn:active { transform: translateY(15px); box-shadow: 0 0 0 #c0392b; }
        
        #canvas-pad { border: 2px solid #333; background: white; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="login-screen" class="screen active">
        <h1>انضمام للجلسة</h1>
        <input type="text" id="player-name" placeholder="اسمك">
        <input type="number" id="room-code" placeholder="كود الجلسة">
        <button onclick="verifyRoom()">التالي</button>
    </div>

    <div id="team-screen" class="screen">
        <h1>اختر فريقك</h1>
        <button class="btn-sec" id="btn-t1" onclick="joinTeam(0)">الفريق 1</button>
        <button class="btn-sec" id="btn-t2" onclick="joinTeam(1)">الفريق 2</button>
    </div>

    <div id="waiting-screen" class="screen" style="background: #DE6241; color:white;">
        <h1 style="color:white; font-size: 40px; animation: pulse 1.5s infinite;">⏳ بانتظار اللعبة...</h1>
    </div>

    <div id="buzzer-screen" class="screen" style="background: #2c3e50;">
        <button class="buzzer-btn" onclick="hitBuzzer()">اضغط</button>
    </div>

    <div id="clicker-screen" class="screen" style="background: #2c3e50;">
        <h2 style="color:white; margin-bottom: 20px;">حرب الأصابع! كسر الشاشة 🚀</h2>
        <button class="clicker-btn" onclick="spamClick()">اضغططط!</button>
    </div>

    <div id="wager-screen" class="screen">
        <h1>كسر العظم 💀</h1>
        <p>كم تخاطر من نقاط فريقك؟</p>
        <input type="number" id="wager-amount" placeholder="أدخل النقاط...">
        <button onclick="submitWager()">اعتماد الرهان</button>
    </div>

    <div id="auction-screen" class="screen">
        <h1>المزاد (دبّسها) 🎯</h1>
        <p id="auction-current" style="font-size: 24px; color: #555; margin-bottom: 20px;">أعلى مزايدة: 0</p>
        <button class="btn-sec" onclick="placeBid(50)">مزايدة +50</button>
        <button class="btn-sec" onclick="placeBid(100)">مزايدة +100</button>
        <button style="background: #c0392b; margin-top: 30px; color:white;" onclick="passAuction()">دبّسها فيهم!</button>
    </div>

    <div id="spy-screen" class="screen" style="background: #27ae60; color: white;">
        <h1 style="color: white;">الكلمة السرية 🕵️‍♂️</h1>
        <div id="spy-word" style="font-size: 50px; font-weight: 900; margin: 30px 0; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px;">-</div>
        <p style="font-size: 20px;">(إذا طلعت لك "أنت الخاين" حاول ترقع الموضوع!)</p>
    </div>

    <div id="drawing-pad-screen" class="screen">
        <h1 style="font-size: 28px;">ارسم: <span id="word-to-draw" style="color:#c0392b; font-size: 34px;"></span></h1>
        <canvas id="canvas-pad" width="320" height="320"></canvas>
        <button class="btn-sec" onclick="clearCanvas()">مسح اللوحة</button>
    </div>

    <div id="drawing-teammate-screen" class="screen" style="background: #27ae60; color:white;">
        <h2>خويك جالس يرسم:</h2>
        <h1 id="teammate-word" style="font-size: 50px; color: #f1c40f; margin: 20px 0;"></h1>
        <p style="font-size: 22px;">🤫 لا تتكلم! خل الفريق الثاني يحوسون!</p>
    </div>

    <div id="drawing-guess-screen" class="screen" style="background: #34495e;">
        <h1 style="font-size:40px; color:white;">وش قاعد يرسم؟ 🤔</h1>
        <h3 id="guess-proximity-msg" style="color:#f1c40f; margin-bottom:10px; min-height: 25px;"></h3>
        <input type="text" id="drawing-guess-input" placeholder="اكتب تخمينك هنا...">
        <button style="background: #DE6241; color:white;" onclick="sendGuess()">إرسال التخمين</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDefi5-VAGxk3RRmtGiUaivlem_lgO3syA", authDomain: "appd-75fbf.firebaseapp.com", databaseURL: "https://appd-75fbf-default-rtdb.firebaseio.com", projectId: "appd-75fbf", storageBucket: "appd-75fbf.appspot.com", messagingSenderId: "38346789995", appId: "1:38346789995:web:4bc14686f2758164dfcd2e" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        let myName = "", currentRoom = "", myTeamIndex = -1, roomRef = null;
        let currentDrawingWord = ""; // لحفظ الكلمة عشان نفحص التقارب محلياً

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function verifyRoom() {
            myName = document.getElementById('player-name').value.trim();
            currentRoom = document.getElementById('room-code').value.trim();
            if(!myName || !currentRoom) return;
            roomRef = db.ref('rooms/' + currentRoom);
            roomRef.once('value', (snap) => {
                if(snap.exists()) {
                    document.getElementById('btn-t1').innerText = snap.val().team_names[0];
                    document.getElementById('btn-t2').innerText = snap.val().team_names[1];
                    showScreen('team-screen');
                } else alert("كود خطأ!");
            });
        }

        function joinTeam(teamIndex) {
            myTeamIndex = teamIndex;
            roomRef.child('players/' + myName).set({ team: teamIndex });
            roomRef.child('latest_join').set({ name: myName, team: teamIndex, timestamp: Date.now() });
            listenToRoom(); showScreen('waiting-screen');
        }

        function listenToRoom() {
            roomRef.on('value', (snap) => {
                const data = snap.val(); if(!data) return;
                
                if (data.status === 'question_active') {
                    if(!data.buzzed_by && (!data.wrong_answers || !data.wrong_answers[myName])) showScreen('buzzer-screen');
                    else showScreen('waiting-screen');
                } else if (data.status === 'clicker') {
                    showScreen('clicker-screen');
                } else if (data.status === 'wager') {
                    showScreen('wager-screen');
                } else if (data.status === 'auction') {
                    document.getElementById('auction-current').innerText = "أعلى مزايدة: " + (data.auction_val || 0);
                    showScreen('auction-screen');
                } else if (data.status === 'spy') {
                    document.getElementById('spy-word').innerText = (data.spy_name === myName) ? "🚨 أنت الخاين 🚨" : data.spy_word;
                    showScreen('spy-screen');
                } else if (data.status === 'drawing') {
                    currentDrawingWord = data.drawing_word; // حفظ الكلمة

                    if (data.drawer_name === myName) {
                        // 1. أنا الرسام
                        document.getElementById('word-to-draw').innerText = data.drawing_word;
                        showScreen('drawing-pad-screen');
                        // تعبئة الكانفس باللون الأبيض عشان ما يطلع أسود في الشاشة الكبيرة!
                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    } else if (myTeamIndex === data.drawer_team) {
                        // 2. أنا خوي الرسام بنفس الفريق
                        document.getElementById('teammate-word').innerText = data.drawing_word;
                        showScreen('drawing-teammate-screen');
                    } else {
                        // 3. أنا الفريق الخصم (المخمن)
                        document.getElementById('guess-proximity-msg').innerText = "";
                        showScreen('drawing-guess-screen');
                    }
                } else {
                    showScreen('waiting-screen');
                }
            });
        }

        function hitBuzzer() { roomRef.child('buzzed_by').transaction(v => v ? undefined : { name: myName, team: myTeamIndex }); }
        
        function spamClick() { 
            roomRef.child('clicker_score').transaction(val => {
                val = val || 50; return myTeamIndex === 0 ? val - 1 : val + 1;
            });
        }

        function submitWager() {
            let w = parseInt(document.getElementById('wager-amount').value);
            if(w > 0) { roomRef.child('wagers/t' + myTeamIndex).set(w); showScreen('waiting-screen'); }
        }

        function placeBid(amount) {
            roomRef.child('auction_val').transaction(v => (v || 0) + amount);
            roomRef.child('auction_bidder').set({name: myName, team: myTeamIndex});
        }
        function passAuction() { roomRef.child('auction_passed').set(true); }

        // إرسال التخمينات من الجوال للشاشة
        function sendGuess() {
            let guess = document.getElementById('drawing-guess-input').value.trim();
            if(!guess) return;
            
            // فحص التقارب محلياً بالجوال عشان نحمسه
            let msgEl = document.getElementById('guess-proximity-msg');
            if (guess !== currentDrawingWord && guess.length >= 3 && (currentDrawingWord.includes(guess) || guess.includes(currentDrawingWord))) {
                msgEl.innerText = "🔥 قربت مررررة!";
            } else {
                msgEl.innerText = "";
            }

            roomRef.child('drawing_guesses').push({
                player: myName,
                team: myTeamIndex,
                text: guess,
                time: Date.now()
            });
            document.getElementById('drawing-guess-input').value = ""; // تفريغ
        }

        // كود الرسم
        let canvas = document.getElementById('canvas-pad'), ctx = canvas.getContext('2d'), drawing = false;
        ctx.strokeStyle = "#000"; ctx.lineWidth = 5; ctx.lineCap = "round";
        
        canvas.addEventListener('touchstart', e => { 
            drawing=true; 
            ctx.beginPath(); 
            ctx.moveTo(e.touches[0].clientX - canvas.getBoundingClientRect().left, e.touches[0].clientY - canvas.getBoundingClientRect().top); 
        });
        canvas.addEventListener('touchmove', e => { 
            if(drawing) { 
                ctx.lineTo(e.touches[0].clientX - canvas.getBoundingClientRect().left, e.touches[0].clientY - canvas.getBoundingClientRect().top); 
                ctx.stroke(); 
                sendDrawingToFB();
            } 
        });
        canvas.addEventListener('touchend', () => drawing=false);

        let drawThrottle;
        function sendDrawingToFB() {
            if(drawThrottle) return;
            drawThrottle = setTimeout(() => {
                drawThrottle = null;
                // يرسل الرسمة مع خلفيتها البيضاء
                roomRef.child('drawing_data').set(canvas.toDataURL("image/jpeg", 0.5));
            }, 100); 
        }

        function clearCanvas() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            roomRef.child('drawing_data').set("");
        }
    </script>
</body>
</html>
